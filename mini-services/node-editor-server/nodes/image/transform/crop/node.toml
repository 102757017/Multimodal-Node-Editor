name = "image.transform.crop"
version = "1.0.0"
display_name = "裁剪"
description = "将图像裁剪到指定区域"
order = 70
gui = ["reactflow", "headless"]

[[ports]]
name = "image"
data_type = "image"
direction = "in"
display_name = "图像"

[[ports]]
name = "cropped_image"
data_type = "image"
direction = "out"
display_name = "裁剪后图像"
preview = false

# 输出裁剪区域坐标（JSON格式）
[[ports]]
name = "crop_bbox"
data_type = "string"
direction = "out"
display_name = "裁剪坐标 (JSON)"
preview = false

[[properties]]
name = "min_x"
display_name = "最小 X"
type = "float"
default = 0.0
widget = "slider"
min = 0.0
max = 1.0
step = 0.01

[[properties]]
name = "min_y"
display_name = "最小 Y"
type = "float"
default = 0.0
widget = "slider"
min = 0.0
max = 1.0
step = 0.01

[[properties]]
name = "max_x"
display_name = "最大 X"
type = "float"
default = 1.0
widget = "slider"
min = 0.0
max = 1.0
step = 0.01

[[properties]]
name = "max_y"
display_name = "最大 Y"
type = "float"
default = 1.0
widget = "slider"
min = 0.0
max = 1.0
step = 0.01